name: Generate Python DSL

on:
  schedule:
    - cron: "0 3 * * 1"  # Every Monday at 03:00 UTC
  workflow_dispatch:
    inputs:
      ref:
        description: "pact-python branch or tag to build from"
        default: main
        required: false

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0

      - name: Generate dsl.python.md
        env:
          PACT_PYTHON_REF: ${{ inputs.ref || 'main' }}
        run: uv run --no-project scripts/generate/dsl_python.py

      - name: Format dsl.python.md
        run: uvx mdformat plugins/swagger-contract-testing/skills/pactflow/references/dsl.python.md

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet \
            plugins/swagger-contract-testing/skills/pactflow/references/dsl.python.md \
            && echo "changed=false" >> "$GITHUB_OUTPUT" \
            || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit updated dsl.python.md
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add plugins/swagger-contract-testing/skills/pactflow/references/dsl.python.md
          git commit -m "chore: regenerate dsl.python.md from pact-python"
          git push
